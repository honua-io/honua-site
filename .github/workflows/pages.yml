name: Pages

on:
  pull_request:
    branches:
      - trunk
    paths:
      - "**"
  push:
    branches:
      - trunk
    paths:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Validate workflow action pinning
        run: ./scripts/validate-workflow-pinning.sh
      - name: Validate lead capture contract
        run: ./scripts/validate-lead-capture.sh
      - name: Validate security headers (static _headers contract)
        run: ./scripts/validate-security-headers.sh
      - name: Build artifact
        run: ./scripts/build-dist.sh
      - name: Validate artifact security headers
        run: |
          test -f ./dist/_headers
          grep -Eq "Content-Security-Policy: .*frame-ancestors 'none'" ./dist/_headers

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Build artifact
        run: ./scripts/build-dist.sh
      # actions/upload-pages-artifact excludes dot-directories (--exclude=".[^/]*"),
      # which drops /.well-known/security.txt. Archive manually so the .well-known
      # directory is preserved, then upload as the github-pages artifact deploy-pages expects.
      - name: Archive Pages artifact (preserve .well-known)
        run: |
          tar \
            --dereference --hard-dereference \
            --exclude=.git \
            --exclude=.github \
            --directory ./dist \
            -cvf "$RUNNER_TEMP/artifact.tar" .
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
      - name: Validate live security headers
        if: ${{ vars.HONUA_HEADER_CHECK_URL != '' }}
        run: HONUA_HEADER_CHECK_URL="${{ vars.HONUA_HEADER_CHECK_URL }}" ./scripts/validate-security-headers.sh
