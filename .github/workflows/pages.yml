name: Pages

on:
  push:
    branches:
      - trunk
    paths:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Validate site
        run: ./scripts/validate-site.sh
      - name: Build artifact
        run: ./scripts/build-dist.sh
      - name: Validate artifact security headers
        run: |
          test -f ./dist/_headers
          rg -q "Content-Security-Policy: .*frame-ancestors 'none'" ./dist/_headers

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Build artifact
        run: ./scripts/build-dist.sh
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
      - name: Validate live security headers
        if: ${{ vars.HONUA_HEADER_CHECK_URL != '' }}
        run: HONUA_HEADER_CHECK_URL="${{ vars.HONUA_HEADER_CHECK_URL }}" ./scripts/validate-security-headers.sh
